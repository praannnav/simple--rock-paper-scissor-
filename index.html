<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissor</title>
    <link rel="icon" type="image/png" href="./scissors.png">
    <link href="style.css" rel="stylesheet">
</head>
<body>
    <div class="header">Rock Paper Scissor</div>
    <div class="game">
        <!-- player 1 side -->
        <div class="player1">
            <strong id="player1-choice">You</strong>
        </div>
        <div class="vertical-line"></div>
        <div class="player2">
            <strong id="player2-choice">Player</strong>
        </div>
         <!-- computer side // player 2 side -->
    </div>
    <div class="button">
        <button class="btn" value="Rock">Rock</button>
        <button class="btn" value="Paper">Paper</button>
        <button class="btn" value="Scissor">Scissor</button>

    </div>
    
    <div class="footer">
        <p>&copy; 2026 Rock Paper Scissors | Made with ❤️ by Pranav</p>
        <strong><a href="">instagram</a></strong> | <strong><a href="">github</a></strong>
        <!-- <p>Rock > Scissors • Scissors > Paper • Paper > Rock</p> -->

    </div>
    <script src="logic.js"></script>
</body>
</html>
